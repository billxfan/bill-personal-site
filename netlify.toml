[build]
publish = "."
functions = "netlify/functions"

[[redirects]]
from = "/robots.txt"
to = "/.netlify/functions/robots"
status = 200

[[redirects]]
from = "/sitemap.xml"
to = "/.netlify/functions/sitemap"
status = 200

[[headers]]
for = "/*"

  [headers.values]
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"
  X-Frame-Options = "DENY"
